<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title data-i18n="sales.title">Ventas</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 30px;
}

input {
    padding: 6px;
    font-size: 14px;
}

/* =========================
   CLIENTE
========================= */
.cliente-box {
    margin-bottom: 20px;
    padding: 10px;
    border: 1px solid #ccc;
}

.row {
    display: flex;
    gap: 10px;
    align-items: center;
    margin-bottom: 8px;
}

.row label {
    width: 130px;
}

#cliente_codigo {
    width: 200px;
}

#cliente_nombre {
    width: 300px;
}

/* =========================
   PRODUCTOS
========================= */
#producto {
    width: 420px;
}

/* =========================
   TABLA
========================= */
table {
    border-collapse: collapse;
    width: 100%;
    margin-top: 20px;
}
th, td {
    border: 1px solid #ccc;
    padding: 8px;
}
th {
    background: #f4f4f4;
}
th.num, td.num {
    text-align: right;
}

/* =========================
   FOOTER
========================= */
tfoot td {
    font-weight: bold;
    background: #fafafa;
}

/* =========================
   MODAL
========================= */
.modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.4);
}

.modal-content {
    background: #fff;
    width: 600px;
    margin: 50px auto;
    padding: 20px;
}

.form-row {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
}
.form-row label {
    width: 150px;
}

/* util */
.hidden { display: none; }

/* quitar flechas number */
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button {
    -webkit-appearance: none;
    margin: 0;
}
input[type=number] {
    -moz-appearance: textfield;
    text-align: right;
}
</style>
</head>

<body>

<h1 data-i18n="sales.title">Nueva Venta</h1>

<!-- =========================
     CLIENTE
========================= -->
<div class="cliente-box">

<div class="row">
    <label data-i18n="sales.clientCode">Código Cliente</label>
    <input id="cliente_codigo" list="clientes" autocomplete="off">
    <datalist id="clientes"></datalist>

    <button onclick="abrirModalCliente()" data-i18n="sales.clientButton">Crear Cliente</button>
</div>

<div class="row">
    <label data-i18n="sales.clientName">Cliente</label>
    <input id="cliente_nombre" readonly>
</div>

</div>

<!-- =========================
     PRODUCTOS
========================= -->
<input
    id="producto"
    list="productos"
    placeholder="Buscar producto por nombre o código"
    data-i18n-placeholder="sales.productPlaceholder"
    autocomplete="off"
/>
<datalist id="productos"></datalist>

<table>
<thead>
<tr>
    <th data-i18n="sales.tableCode">Código</th>
    <th data-i18n="sales.tableProduct">Producto</th>
    <th class="num" data-i18n="sales.tablePrice">Precio</th>
    <th class="num" data-i18n="sales.tableQuantity">Cantidad</th>
    <th class="num" data-i18n="sales.tableSubtotal">Subtotal</th>
</tr>
</thead>

<tbody id="detalle"></tbody>

<tfoot>
<tr>
    <td colspan="4">Total</td>
    <td class="num">$<span id="total">0.00</span></td>
</tr>
</tfoot>
</table>

<button onclick="confirmarVenta()" data-i18n="sales.confirmButton">Confirmar venta</button>

<!-- =========================
     MODAL CLIENTE
========================= -->
<div class="modal" id="modalCliente">
<div class="modal-content">

<h2 data-i18n="sales.modalTitle">Alta de Cliente</h2>

<div class="form-row">
    <label data-i18n="sales.modalType">Tipo</label>
    <div>
        <input type="radio" name="tipo" value="EMPRESA" checked onchange="cambiarTipo()"> <span data-i18n="sales.modalEmpresa">Empresa</span>
        <input type="radio" name="tipo" value="PERSONA" onchange="cambiarTipo()"> <span data-i18n="sales.modalPersona">Persona</span>
    </div>
</div>

<div class="form-row empresa">
    <label data-i18n="sales.modalFiscalCode">Código Fiscal *</label>
    <input id="codigo_fiscal">
</div>

<div class="form-row persona hidden">
    <label data-i18n="sales.modalDNI">DNI</label>
    <input id="dni">
</div>

<div class="form-row">
    <label data-i18n="sales.modalName">Nombre / Razón Social *</label>
    <input id="nombre_razon">
</div>

<div class="form-row">
    <label data-i18n="sales.modalPhone">Teléfono</label>
    <input id="telefono">
</div>

<div class="form-row">
    <label data-i18n="sales.modalStreet">Calle</label>
    <input id="calle">
</div>

<div class="form-row">
    <label data-i18n="sales.modalNumber">Número</label>
    <input id="numero">
</div>

<div class="form-row">
    <label data-i18n="sales.modalLocale">Localidad</label>
    <input id="localidad">
</div>

<div class="form-row">
    <label data-i18n="sales.modalPostalCode">CP</label>
    <input id="codigo_postal">
</div>

<div class="form-row">
    <button onclick="guardarCliente()" data-i18n="sales.modalSave">Guardar</button>
    <button onclick="cerrarModalCliente()" data-i18n="sales.modalCancel">Cancelar</button>
</div>

</div>
</div>

<script src="/static/lang.js"></script>
<script>
const buscarClientesUrl = "http://127.0.0.1:8000/clientes/buscar";
const crearClienteUrl = "http://127.0.0.1:8000/clientes";
const buscarProductosUrl = "http://127.0.0.1:8000/productos/buscar";
const ventasUrl = "http://127.0.0.1:8000/ventas";

let clienteActual = null;
let clientesCache = [];
let productosCache = [];
let detalles = [];

/* =========================
   CLIENTES
========================= */

cliente_codigo.addEventListener("input", async () => {
    const q = cliente_codigo.value.trim();
    if (q.length < 2) return;

    const res = await fetch(`${buscarClientesUrl}?q=${encodeURIComponent(q)}`);
    const clientes = await res.json();

    clientesCache = clientes;
    clientes.innerHTML = "";

    clientes.forEach(c => {
        const opt = document.createElement("option");
        opt.value = `${c.codigo_cliente} - ${c.nombre_razon_social}`;
        opt.dataset.codigo_cliente = c.codigo_cliente;
        document.getElementById("clientes").appendChild(opt);
    });
});

cliente_codigo.addEventListener("change", () => {
    const val = cliente_codigo.value;
    const c = clientesCache.find(x =>
        `${x.codigo_cliente} - ${x.nombre_razon_social}` === val
    );
    if (!c) return;

    clienteActual = c;
    cliente_nombre.value = c.nombre_razon_social;
});

/* =========================
   PRODUCTOS (igual que antes)
========================= */

producto.addEventListener("input", async () => {
    const q = producto.value.trim();
    if (q.length < 2) return;

    const res = await fetch(`${buscarProductosUrl}?q=${encodeURIComponent(q)}`);
    const productos = await res.json();

    productosCache = productos;
    productos.innerHTML = "";

    productos.forEach(p => {
        const opt = document.createElement("option");
        opt.value = `${p.codigo} ${p.nombre}`;
        opt.dataset.id = p.id;
        document.getElementById("productos").appendChild(opt);
    });
});

producto.addEventListener("change", () => {
    const val = producto.value;
    const p = productosCache.find(x => `${x.codigo} ${x.nombre}` === val);
    if (!p) return;

    agregarProducto(p, 1);
    producto.value = "";
});

/* =========================
   CARRITO
========================= */

function agregarProducto(p, cant) {
    const ex = detalles.find(d => d.producto_id === p.id);
    if (ex) ex.cantidad += cant;
    else detalles.push({
        producto_id: p.id,
        codigo: p.codigo,
        nombre: p.nombre,
        precio: p.precio,
        cantidad: cant
    });
    render();
}

function render() {
    detalle.innerHTML = "";
    let total = 0;

    detalles.forEach((d,i) => {
        const sub = d.precio * d.cantidad;
        total += sub;

        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td>${d.codigo}</td>
            <td>${d.nombre}</td>
            <td class="num">$${d.precio.toFixed(2)}</td>
            <td class="num">
              <input type="number" min="1" value="${d.cantidad}">
            </td>
            <td class="num">$${sub.toFixed(2)}</td>
        `;
        detalle.appendChild(tr);
    });

    totalSpan.textContent = total.toFixed(2);
}

/* =========================
   VALIDAR VENTA
========================= */

async function confirmarVenta() {
    if (!clienteActual) {
        alert(translate("sales.selectClientRequired"));
        return;
    }

    if (!detalles.length) {
        alert(translate("sales.noProducts"));
        return;
    }

    const payload = {
        cliente_id: clienteActual.id,
        detalles: detalles.map(d => ({
            producto_id: d.producto_id,
            cantidad: d.cantidad
        }))
    };

    const res = await fetch(ventasUrl, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
    });

    if (!res.ok) {
        const err = await res.json();
        alert(err.detail || translate("sales.customerInvalid"));
        return;
    }

    const data = await res.json();

    alert(translate("sales.registered", { total: data.total }));

    // Reset de la venta
    detalles = [];
    clienteActual = null;
    cliente_codigo.value = "";
    cliente_nombre.value = "";
    render();
}

/* =========================
   MODAL CLIENTE
========================= */

function abrirModalCliente() {
    modalCliente.style.display = "block";
}
function cerrarModalCliente() {
    modalCliente.style.display = "none";
}
function cambiarTipo() {
    const tipo = document.querySelector("input[name=tipo]:checked").value;
    document.querySelector(".empresa").style.display = tipo === "EMPRESA" ? "flex" : "none";
    document.querySelector(".persona").style.display = tipo === "PERSONA" ? "flex" : "none";
}
async function guardarCliente() {
    const tipo = document.querySelector("input[name=tipo]:checked").value;

    const payload = {
        tipo_cliente: tipo,
        nombre_razon_social: nombre_razon.value,
        telefono: telefono.value,
        calle: calle.value,
        numero: numero.value,
        localidad: localidad.value,
        codigo_postal: codigo_postal.value,
        codigo_fiscal: tipo === "EMPRESA" ? codigo_fiscal.value : null,
        dni: tipo === "PERSONA" ? dni.value : null
    };

    const res = await fetch(crearClienteUrl, {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify(payload)
    });

    const c = await res.json();
    clienteActual = c;
    cliente_codigo.value = `${c.codigo_cliente} - ${c.nombre_razon_social}`;
    cliente_nombre.value = c.nombre_razon_social;

    cerrarModalCliente();
}
</script>

</body>
</html>
