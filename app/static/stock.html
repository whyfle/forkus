<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title data-i18n="stock.title">Ingreso de Stock</title>
<style>
body { font-family: Arial; margin: 30px; }
input, select, button { margin: 5px; padding: 6px; }

/* Dark theme */
body.dark {
    background-color: #121212;
    color: #ffffff;
}
body.dark input, body.dark button, body.dark select {
    background-color: #333;
    color: #fff;
    border: 1px solid #555;
}
body.dark h1, body.dark h2, body.dark label, body.dark p {
    color: #fff;
}
body.dark a {
    color: #4da6ff;
}
body.dark a:hover {
    color: #6bb9ff;
}
</style>
</head>
<body>

<h1 data-i18n="stock.title">Ingreso de Stock</h1>

<select id="producto"></select>
<input type="number" id="cantidad" placeholder="Cantidad" min="1" data-i18n-placeholder="stock.quantityPlaceholder">
<input type="text" id="motivo" placeholder="Motivo (opcional)" data-i18n-placeholder="stock.reasonPlaceholder">
<button onclick="ingresarStock()" data-i18n="stock.button">Ingresar</button>

<script>
const productosUrl = "http://127.0.0.1:8000/productos-admin";
const ingresoUrl = "http://127.0.0.1:8000/stock/ingreso";

async function cargarProductos() {
    const res = await fetch(productosUrl);
    const productos = await res.json();
    const select = document.getElementById("producto");

    productos
        .filter(p => p.activo)
        .forEach(p => {
            const opt = document.createElement("option");
            opt.value = p.id;
            opt.textContent = `${p.nombre} (Stock: ${p.stock})`;
            select.appendChild(opt);
        });
}

async function ingresarStock() {
    const producto_id = parseInt(document.getElementById("producto").value);
    const cantidad = parseInt(document.getElementById("cantidad").value);
    const motivo = document.getElementById("motivo").value;

    if (!cantidad || cantidad <= 0) {
        alert(translate("stock.invalidQuantity"));
        return;
    }

    const res = await fetch(ingresoUrl, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ producto_id, cantidad, motivo })
    });

    const data = await res.json();
    alert(translate("stock.updatedMessage", { stock: data.nuevo_stock }));
    location.reload();
}

cargarProductos();
</script>
<script src="/static/lang.js"></script>
<script>
window.addEventListener('DOMContentLoaded', () => {
    const token = localStorage.getItem('token');
    if (!token) {
        window.location.href = '/login';
    }
});
</script>
</body>
</html>
