<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Configuración</title>
    <style>
        body { font-family: Arial; margin: 30px; }
        input, button { padding: 6px; margin: 5px; }
        ul { margin-top: 15px; }
    </style>
</head>
<body>

<h1 data-i18n="settings.title">Configuración del Sistema</h1>

<h2 data-i18n="settings.categoriesHeading">Categorías de Productos</h2>

<div class="form-row">
    <label data-i18n="settings.languageLabel">Idioma</label>
    <select id="idioma">
        <option value="es" data-i18n="settings.languageOptionEs">Español</option>
        <option value="en" data-i18n="settings.languageOptionEn">Inglés</option>
    </select>
</div>

<input type="text" id="nombreCategoria" placeholder="Nueva categoría" data-i18n-placeholder="settings.newCategoryPlaceholder">
<button onclick="crearCategoria()" data-i18n="settings.addCategoryButton">Agregar</button>

<ul id="listaCategorias"></ul>

<script src="/static/lang.js"></script>
<script>
const apiUrl = "http://127.0.0.1:8000/categorias";

async function cargarCategorias() {
    const res = await fetch(apiUrl);
    const categorias = await res.json();

    const ul = document.getElementById("listaCategorias");
    ul.innerHTML = "";

    categorias.forEach(c => {
        const li = document.createElement("li");
        li.textContent = c.nombre;
        ul.appendChild(li);
    });
}

async function crearCategoria() {
    const nombre = document.getElementById("nombreCategoria").value;
    if (!nombre) return;

    await fetch(apiUrl, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ nombre })
    });

    document.getElementById("nombreCategoria").value = "";
    cargarCategorias();
}

async function cargarConfiguracion() {
    const res = await fetch("/api/configuracion");
    const config = await res.json();
    document.getElementById("idioma").value = config.idioma || "es";
}

idioma.addEventListener("change", async () => {
    const res = await fetch("/api/configuracion", {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            max_precio_producto: 9999.99,
            max_stock_producto: 10000,
            idioma: document.getElementById("idioma").value
        })
    });
    if (res.ok) {
        loadLanguageConfig();
    }
});

cargarCategorias();
cargarConfiguracion();
</script>

</body>
</html>
