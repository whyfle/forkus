<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Stock</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }
        h1 {
            margin-bottom: 30px;
        }
        .menu {
            display: flex;
            gap: 20px;
        }
        a {
            text-decoration: none;
        }
        .card {
            border: 1px solid #ccc;
            padding: 20px;
            width: 200px;
            text-align: center;
            background: #f9f9f9;
            cursor: pointer;
        }
        .card:hover {
            background: #eaeaea;
        }

        /* Dark theme */
        body.dark {
            background-color: #121212;
            color: #ffffff;
        }
        body.dark .card {
            background: #333;
            border-color: #555;
        }
        body.dark .card:hover {
            background: #444;
        }
        body.dark h1, body.dark h2, body.dark label, body.dark p {
            color: #fff;
        }
        body.dark a {
            color: #4da6ff;
        }
        body.dark a:hover {
            color: #6bb9ff;
        }
    </style>
</head>
<body>

<h1 data-i18n="home.title">Sistema de Stock y Ventas</h1>

<div class="menu">
    <a href="/web">
        <div class="card">
            <h3 data-i18n="home.productsCardTitle">Productos</h3>
            <p data-i18n="home.productsCardDesc">ABM y stock</p>
        </div>
    </a>

    <a href="/ventas-web">
        <div class="card">
            <h3 data-i18n="home.salesCardTitle">Nueva Venta</h3>
            <p data-i18n="home.salesCardDesc">Registrar ventas</p>
        </div>
    </a>

    <a href="/historial-web">
        <div class="card">
            <h3 data-i18n="home.historyCardTitle">Historial</h3>
            <p data-i18n="home.historyCardDesc">Ver ventas</p>
        </div>
    </a>

    <a href="/stock-web">
    <div class="card">
        <h3 data-i18n="home.stockCardTitle">Ingreso de Stock</h3>
        <p data-i18n="home.stockCardDesc">Compras y ajustes</p>
    </div>
    </a>

    <a href="/configuracion">
    <div class="card">
        <h3 data-i18n="home.configCardTitle">Configuración</h3>
        <p data-i18n="home.configCardDesc">Categorías y ajustes</p>
    </div>
</a>
    
</div>

<script src="/static/lang.js"></script>
</body>
</html>
