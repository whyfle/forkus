<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title data-i18n="index.title">Productos</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
}

/* Dark theme */
body.dark {
    background-color: #121212;
    color: #ffffff;
}
body.dark .ribbon {
    background: #333;
    border-bottom: 1px solid #555;
}
body.dark input, body.dark button, body.dark select {
    background-color: #333;
    color: #fff;
    border: 1px solid #555;
}
body.dark table, body.dark th, body.dark td {
    border-color: #555;
}
body.dark th {
    background-color: #444;
}
body.dark h1, body.dark h2, body.dark label, body.dark p {
    color: #fff;
}
body.dark a {
    color: #4da6ff;
}
body.dark a:hover {
    color: #6bb9ff;
}

/* =========================
   RIBBON
========================= */
.ribbon {
    display: flex;
    gap: 10px;
    padding: 10px 20px;
    background: #f4f4f4;
    border-bottom: 1px solid #ccc;
}

.ribbon button {
    padding: 6px 12px;
}

/* =========================
   CONTENIDO
========================= */
.container {
    padding: 30px;
}

/* =========================
   FORMULARIO
========================= */
.form-row {
    display: flex;
    gap: 15px;
    margin-bottom: 15px;
    align-items: center;
}

.form-row label {
    width: 120px;
}

input {
    padding: 6px;
    font-size: 14px;
}

#categoria { width: 260px; }
#nombre { width: 360px; }
#precio {
    width: 160px;
    text-align: right;
}
#stock {
    width: 80px;
    text-align: right;
}

button.primary {
    padding: 8px 16px;
}

/* quitar flechas */
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button {
    -webkit-appearance: none;
    margin: 0;
}
input[type=number] {
    -moz-appearance: textfield;
}

/* =========================
   TABLA
========================= */
table {
    border-collapse: collapse;
    width: 100%;
    margin-top: 30px;
}
th, td {
    border: 1px solid #ccc;
    padding: 8px;
}
th {
    background: #f4f4f4;
    text-align: left;
}
td.num, th.num {
    text-align: right;
}
</style>
</head>

<body>

<div class="ribbon">
    <button onclick="volver()" data-i18n="index.back">⬅ Volver</button>
</div>

<div class="container">

<h1 data-i18n="index.title">Alta de Productos</h1>

<form id="productoForm">

<div class="form-row">
    <label data-i18n="index.category">Categoría</label>
    <input list="categorias" id="categoria" required>
    <datalist id="categorias"></datalist>
</div>

<div class="form-row">
    <label data-i18n="index.name">Nombre</label>
    <input id="nombre" required>
</div>

<div class="form-row">
    <label data-i18n="index.price">Precio</label>
    <input id="precio" type="number" step="0.01" required>
</div>

<div class="form-row">
    <label data-i18n="index.stock">Stock inicial</label>
    <input id="stock" type="number" min="0" required>
</div>

<div class="form-row">
    <button type="submit" class="primary" data-i18n="index.addButton">Añadir</button>
</div>

</form>

<h2 data-i18n="index.productsHeading">Productos</h2>

<table>
<thead>
<tr>
    <th class="num">ID</th>
    <th data-i18n="index.name">Nombre</th>
    <th class="num" data-i18n="index.price">Precio</th>
    <th class="num" data-i18n="index.stock">Stock</th>
    <th data-i18n="index.category">Categoría</th>
    <th data-i18n="index.state">Estado</th>
    <th data-i18n="index.action">Acción</th>
</tr>
</thead>
<tbody id="productosTabla"></tbody>
</table>

</div>

<script src="/static/lang.js"></script>
<script>
const productosUrl = "http://127.0.0.1:8000/productos";
const productosAdminUrl = "http://127.0.0.1:8000/productos-admin";
const categoriasUrl = "http://127.0.0.1:8000/categorias";

/* =========================
   CATEGORIAS
========================= */
async function cargarCategorias() {
    const res = await fetch(categoriasUrl);
    const categorias = await res.json();
    const dl = document.getElementById("categorias");
    dl.innerHTML = "";
    categorias.forEach(c => {
        const o = document.createElement("option");
        o.value = c.nombre;
        o.dataset.id = c.id;
        dl.appendChild(o);
    });
}

/* =========================
   LISTADO
========================= */
async function cargarProductos() {
    const res = await fetch(productosAdminUrl);
    const productos = await res.json();

    const tb = document.getElementById("productosTabla");
    tb.innerHTML = "";

    productos.forEach(p => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td class="num">${p.id}</td>
            <td>${p.nombre}</td>
            <td class="num">$${p.precio_venta.toFixed(2)}</td>
            <td class="num">${p.stock}</td>
            <td>${p.categoria ? p.categoria.nombre : "-"}</td>
            <td>${p.activo ? translate("index.active") : translate("index.inactive")}</td>
            <td>
                <button onclick="toggle(${p.id}, ${p.activo})">
                    ${p.activo ? translate("index.deactivate") : translate("index.activate")}
                </button>
            </td>
        `;
        tb.appendChild(tr);
    });
}

/* =========================
   ALTA
========================= */
document.getElementById("productoForm").addEventListener("submit", async e => {
    e.preventDefault();

    const catName = categoria.value;
    const catOpt = [...categorias.options].find(o => o.value === catName);
    if (!catOpt) {
        alert(translate("settings.categoryInvalid"));
        return;
    }

    await fetch(productosUrl, {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
            nombre: nombre.value,
            precio_venta: parseFloat(precio.value),
            stock: parseInt(stock.value),
            categoria_id: parseInt(catOpt.dataset.id),
            activo: true
        })
    });

    productoForm.reset();
    cargarProductos();
});

/* =========================
   ACTIVAR / DESACTIVAR
========================= */
async function toggle(id, activo) {
    const url = `http://127.0.0.1:8000/productos/${id}/${activo ? "desactivar" : "activar"}`;
    await fetch(url, { method: "PATCH" });
    cargarProductos();
}

function volver() {
    window.location.href = "/";
}

window.addEventListener('DOMContentLoaded', () => {
    const token = localStorage.getItem('token');
    if (!token) {
        window.location.href = '/login';
    }
    cargarCategorias();
    cargarProductos();
});

cargarCategorias();
cargarProductos();
</script>

</body>
</html>
